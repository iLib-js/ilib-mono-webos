name: Test Scripts

on: [push, pull_request]

jobs:
    test-scripts:
        name: Test Scripts
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [20]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install pnpm
              uses: pnpm/action-setup@v4
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm
            - name: Install bats
              uses: bats-core/bats-action@3.0.1
            - name: Install Python 3
              uses: actions/setup-python@v5
              with:
                  python-version: '3'
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Run xliff_split_merge tests
              working-directory: scripts/xliff_split_merge
              run: bats test_xliff_split_merge.bats
            - name: Run xliff_delete_units tests
              working-directory: scripts/xliff_delete_units
              run: bats test_xliff_delete_units.bats
